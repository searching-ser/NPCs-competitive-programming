name: Codebook

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snippets:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Compile and test GNU C++17 snippets
        run: make check

  pdf:
    runs-on: ubuntu-24.04
    container: danteev/texlive:2026-07-01
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Build every layout and print profile
        run: make pdf-all
      - name: Upload printable PDFs
        uses: actions/upload-artifact@v6
        with:
          name: npc-codebook-pdfs
          path: build/*.pdf
          if-no-files-found: error
